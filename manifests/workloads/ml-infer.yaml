apiVersion: batch/v1
kind: Job
metadata:
  name: ml-infer
  labels:
    app: ml-infer
  annotations:
    # Increased model size (800MB) and matrix (800x800 × 12 reps) so that
    # cloud (24GB RAM, 8 CPUs) finishes well within deadline while edge
    # (8GB RAM, 4 CPUs under contention) struggles more.
    # Deadline 50s: cloud-1 p95=46s (+8% margin), edge/fog p95>115s (fails). Cloud-required workload.
    slo.hybrid.io/class: "batch"
    slo.hybrid.io/latencyTargetMs: "350"
    slo.hybrid.io/deadlineMs: "50000"
    slo.hybrid.io/preferCloud: "true"
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        scheduling.hybrid.io/managed: "true"
        app: ml-infer
      annotations:
        slo.hybrid.io/class: "batch"
        slo.hybrid.io/latencyTargetMs: "350"
        slo.hybrid.io/deadlineMs: "50000"
        slo.hybrid.io/preferCloud: "true"
    spec:
      restartPolicy: Never
      containers:
        - name: infer
          image: python:3.11-slim
          env:
            - name: MAT
              value: "800"
            - name: REPS
              value: "12"
            - name: MODEL_MB
              value: "800"
            - name: THREADS
              value: "2"
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              pip install --no-cache-dir numpy
              head -c $((MODEL_MB*1024*1024)) </dev/urandom >/tmp/model.bin
              python - <<'PY'
              import os, time, numpy as np, mmap
              MAT=int(os.getenv("MAT","600")); REPS=int(os.getenv("REPS","8"))
              THREADS=os.getenv("THREADS","1")
              os.environ["OPENBLAS_NUM_THREADS"]=THREADS
              os.environ["OMP_NUM_THREADS"]=THREADS
              with open("/tmp/model.bin","rb") as f:
                  mm = mmap.mmap(f.fileno(), 0, access=mmap.ACCESS_READ)
                  _ = sum(mm[:1024])
              t0=time.time()
              for i in range(REPS):
                  a=np.random.rand(MAT,MAT); b=np.random.rand(MAT,MAT)
                  _=(a@b).sum()
              dt=time.time()-t0
              print(f"mat={MAT} reps={REPS} threads={THREADS} time={dt:.3f}s per_infer={dt/REPS:.3f}s")
              PY
          resources:
            requests:
              cpu: "1500m"
              memory: "2Gi"
            limits:
              cpu: "3000m"
              memory: "3Gi"