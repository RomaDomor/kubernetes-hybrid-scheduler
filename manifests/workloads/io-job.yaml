apiVersion: batch/v1
kind: Job
metadata:
  name: io-job
  labels:
    app: io-job
  annotations:
    # I/O + compute stress test — no internet dependency.
    # Generates 512MB of pseudo-random data (CPU-bound), then writes and
    # reads it back in multiple passes (I/O-bound).
    #
    # Edge (4 CPU, 8 GB):  generation + write + read = ~70-110s
    # Cloud (8 CPU, 24 GB): fewer CPUs shared, faster generation = ~40-70s
    #
    # Under edge local-load pressure the gap widens further, causing deadline
    # misses that a smart scheduler avoids by offloading to cloud.
    slo.hybrid.io/class: "batch"
    slo.hybrid.io/deadlineMs: "100000"
    slo.hybrid.io/preferCloud: "true"
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: io-job
        scheduling.hybrid.io/managed: "true"
      annotations:
        slo.hybrid.io/class: "batch"
        slo.hybrid.io/deadlineMs: "100000"
        slo.hybrid.io/preferCloud: "true"
    spec:
      restartPolicy: Never
      containers:
        - name: io
          image: python:3.11-slim
          env:
            - name: CHUNK_MB
              value: "64"     # size of each generated chunk
            - name: CHUNKS
              value: "8"      # 8 × 64 MB = 512 MB total
            - name: PASSES
              value: "3"      # write then read-back passes
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              pip install --no-cache-dir numpy
              python - <<'PY'
              import numpy as np, os, time, hashlib

              CHUNK_MB = int(os.getenv("CHUNK_MB", "64"))
              CHUNKS   = int(os.getenv("CHUNKS",   "8"))
              PASSES   = int(os.getenv("PASSES",   "3"))
              WORK     = "/work"
              os.makedirs(WORK, exist_ok=True)

              t0 = time.time()

              # Phase 1: generate chunks (CPU-bound numpy operations)
              print(f"Phase 1: generating {CHUNKS} × {CHUNK_MB} MB chunks…")
              chunk_size = CHUNK_MB * 1024 * 1024 // 8  # float64 elements
              for i in range(CHUNKS):
                  data = np.random.rand(chunk_size)
                  # lightweight CPU work: running statistics
                  _ = (np.cumsum(data) * np.sin(data)).sum()
                  path = f"{WORK}/chunk_{i:02d}.bin"
                  data.tofile(path)
                  print(f"  chunk {i+1}/{CHUNKS} written ({CHUNK_MB} MB)")

              gen_time = time.time() - t0
              print(f"Generation done in {gen_time:.2f}s")

              # Phase 2: write + read-back passes (I/O-bound)
              for p in range(PASSES):
                  print(f"Pass {p+1}/{PASSES}: read → hash → rewrite…")
                  for i in range(CHUNKS):
                      path = f"{WORK}/chunk_{i:02d}.bin"
                      raw  = np.fromfile(path, dtype=np.float64)
                      # compute checksum to force actual read
                      h = hashlib.md5(raw.tobytes()).hexdigest()
                      # mutate and rewrite
                      raw *= 1.000001
                      raw.tofile(path)

              total = time.time() - t0
              print(f"IO job done in {total:.2f}s total")
              PY
          resources:
            requests: { cpu: "1000m", memory: "768Mi" }
            limits:   { cpu: "2000m", memory: "1280Mi" }
          volumeMounts:
            - name: work
              mountPath: /work
      volumes:
        - name: work
          emptyDir: {}
